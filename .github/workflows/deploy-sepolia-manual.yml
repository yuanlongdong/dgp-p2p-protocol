name: deploy-sepolia-manual

on:
  workflow_dispatch:
    inputs:
      target_network:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - arbSepolia
          - opSepolia

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Enable corepack
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Deploy contracts
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          ARB_SEPOLIA_RPC_URL: ${{ secrets.ARB_SEPOLIA_RPC_URL }}
          OP_SEPOLIA_RPC_URL: ${{ secrets.OP_SEPOLIA_RPC_URL }}
        run: |
          if [ "${{ github.event.inputs.target_network }}" = "arbSepolia" ]; then
            pnpm --filter @dgp/contracts deploy:arb-sepolia
          else
            pnpm --filter @dgp/contracts deploy:op-sepolia
          fi
      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployments-${{ github.event.inputs.target_network }}
          path: packages/contracts/deployments/*.json
      - name: Demo e2e post-check (skip ui build)
        run: |
          if [ "${{ github.event.inputs.target_network }}" = "arbSepolia" ]; then
            pnpm demo:e2e:arb -- "https://example.com/subgraph" --skip-ui-build
          else
            pnpm demo:e2e:op -- "https://example.com/subgraph" --skip-ui-build
          fi
      - name: Upload demo e2e artifacts
        uses: actions/upload-artifact@v4
        with:
          name: demo-e2e-${{ github.event.inputs.target_network }}
          path: |
            apps/web/.env.local
            apps/miniapp/.env.local
            packages/subgraph/subgraph.yaml
            packages/subgraph/build/subgraph.yaml
