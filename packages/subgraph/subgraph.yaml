specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: EscrowFactory
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: EscrowFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Escrow
      abis:
        - name: EscrowFactory
          file: ./abis/EscrowFactory.json
      eventHandlers:
        - event: EscrowCreated(indexed uint256,indexed address,indexed address,address)
          handler: handleEscrowCreated
      file: ./src/mapping.ts
  - kind: ethereum/contract
    name: DisputeModule
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: DisputeModule
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Dispute
        - Vote
      abis:
        - name: DisputeModule
          file: ./abis/DisputeModule.json
      eventHandlers:
        - event: DisputeOpened(indexed uint256,indexed address)
          handler: handleDisputeOpened
        - event: Voted(indexed uint256,indexed address,uint16,uint16)
          handler: handleVoted
        - event: Resolved(indexed uint256,uint16)
          handler: handleResolved
      file: ./src/mapping.ts
